<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 모두의 축구</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Malgun Gothic', sans-serif; }
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 400px; text-align: center; }
        h2 { margin-bottom: 30px; color: #1e293b; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #475569; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; }
        .btn-login { width: 100%; padding: 14px; background-color: #22c55e; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .back-home { display: inline-block; margin-top: 20px; color: #94a3b8; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>⚽ 모두의 축구 로그인</h2>
        <form action="index.html" method="GET">
            <div class="input-group">
                <label>아이디</label>
                <input type="text" required>
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" required>
            </div>
            <button type="submit" class="btn-login">로그인</button>
        </form>
        <a href="index.html" class="back-home">메인페이지로 돌아가기</a>
    </div>
</body>
</html>
